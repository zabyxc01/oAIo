<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oAIo</title>
  <script src="https://unpkg.com/litegraph.js/build/litegraph.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/litegraph.js/css/litegraph.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TOP BAR row 1: identity + gauges + active mode tabs -->
  <div id="topbar">
    <div id="topbar-r1">
      <span id="sys-name">SYS-PANDORA-OAO</span>
      <div id="gauges">
        <div class="gauge">
          <label>VRAM</label>
          <div class="bar"><div id="vram-bar" class="fill"></div></div>
          <span id="vram-label">-- / 20 GB</span>
        </div>
        <div class="gauge">
          <label>RAM</label>
          <div class="bar"><div id="ram-bar" class="fill"></div></div>
          <span id="ram-label">-- / 62 GB</span>
        </div>
        <div class="gauge">
          <label>GPU</label>
          <div class="bar"><div id="gpu-bar" class="fill"></div></div>
          <span id="gpu-label">--%</span>
        </div>
      </div>
      <div id="active-tabs"><span id="no-mode">NO MODE</span></div>
    </div>

    <!-- TOP BAR row 2: mode buttons + templates -->
    <div id="topbar-r2">
      <span class="mode-label">MODE:</span>
      <button class="mode-btn" data-mode="converse">CONVERSE</button>
      <button class="mode-btn" data-mode="create">CREATE</button>
      <button class="mode-btn" data-mode="forge">FORGE</button>
      <button class="mode-btn" data-mode="render_full">RENDER: FULL</button>
      <button class="mode-btn" data-mode="render_video">RENDER: VIDEO</button>
      <button class="mode-btn" data-mode="render_image">RENDER: IMAGE</button>
      <button class="mode-btn" data-mode="render_3d">RENDER: 3D</button>
      <div class="r2-sep"></div>
      <span class="mode-label">TPL:</span>
      <div id="template-list"></div>
      <button id="save-template">+ Save</button>
    </div>
  </div>

  <!-- ALERT BANNER -->
  <div id="alert-banner" class="alert-banner hidden"></div>

  <!-- TIMELINE HEATMAP -->
  <div id="timeline">
    <div id="view-toggles">
      <button class="view-pill active" data-view="vram">VRAM</button>
      <button class="view-pill active" data-view="ram">RAM</button>
      <button class="view-pill active" data-view="gpu">GPU</button>
      <button class="view-pill" data-view="nvme">NVMe</button>
      <button class="view-pill" data-view="sata">SATA</button>
    </div>
    <canvas id="timeline-canvas"></canvas>
  </div>

  <!-- NODE CANVAS -->
  <div id="canvas-wrap">
    <div id="canvas-nav">
      <div id="group-filter">
        <button class="grp-pill active" data-group="all">ALL</button>
        <button class="grp-pill" data-group="oLLM">oLLM</button>
        <button class="grp-pill" data-group="oAudio">oAudio</button>
        <button class="grp-pill" data-group="Render">RENDER</button>
      </div>
      <div id="breadcrumb" class="hidden">
        <button id="crumb-back">← BACK</button>
        <span id="crumb-path"></span>
      </div>
    </div>
    <canvas id="node-canvas"></canvas>
  </div>

  <!-- CONFIG PANEL -->
  <div id="config-panel">
    <div id="config-header">
      <span id="config-node-name">Select a node or mode</span>
      <span id="config-node-group"></span>
      <span id="config-vram-est"></span>
      <button id="config-paths-btn" class="mode-btn">&#9881; PATHS</button>
    </div>

    <!-- NODE config view (per-app) -->
    <div id="config-node" class="config-view">
      <div id="config-body">
        <div class="config-field">
          <div class="config-row">
            <label>Memory Mode</label>
            <select id="cfg-memory">
              <option value="vram">VRAM</option>
              <option value="ram">RAM</option>
              <option value="storage">Storage</option>
            </select>
          </div>
          <div class="config-sub hidden" id="sub-memory"></div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Priority</label>
            <input id="cfg-priority" type="number" min="1" max="5" value="1" style="width:44px" />
          </div>
          <div class="config-sub hidden" id="sub-priority"></div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Bus Preference</label>
            <select id="cfg-bus">
              <option value="nvme">NVMe</option>
              <option value="sata">SATA</option>
              <option value="ram">RAM</option>
            </select>
          </div>
          <div class="config-sub hidden" id="sub-bus"></div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Limit Mode</label>
            <select id="cfg-limit">
              <option value="soft">Soft Warning</option>
              <option value="hard">Hard Cutoff</option>
            </select>
          </div>
          <div class="config-sub hidden" id="sub-limit"></div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Boot with System</label>
            <input id="cfg-boot" type="checkbox" />
          </div>
          <div class="config-sub hidden" id="sub-boot"></div>
        </div>
      </div>

      <!-- Mode allocations — shown when a mode is active -->
      <div id="mode-allocs" class="hidden">
        <div class="section-label" style="padding: 6px 16px 2px">MODE ALLOCATIONS</div>
        <div id="mode-allocs-body"></div>
      </div>
    </div>

    <!-- PATHS config view (storage symlinks + routing) -->
    <div id="config-paths" class="config-view hidden">
      <div id="paths-body">
        <div id="paths-section">
          <span class="section-label">STORAGE</span>
          <div id="paths-list"></div>
        </div>
        <div id="routing-section">
          <span class="section-label">ROUTING</span>
          <div class="config-field">
            <div class="config-row"><label>TTS URL</label><input class="route-input" id="route-tts-url" /></div>
          </div>
          <div class="config-field">
            <div class="config-row"><label>Image Gen URL</label><input class="route-input" id="route-imggen-url" /></div>
          </div>
          <div class="config-field">
            <div class="config-row"><label>Ollama URL</label><input class="route-input" id="route-ollama-url" /></div>
          </div>
          <div class="config-field">
            <div class="config-row"><label>STT URL</label><input class="route-input" id="route-stt-url" /></div>
          </div>
          <button id="save-routing-btn" class="mode-btn">APPLY ROUTING</button>
        </div>
      </div>
    </div>

    <!-- MODE config view (total system allocation) -->
    <div id="config-mode" class="config-view hidden">
      <div id="config-body-mode">
        <div class="config-field">
          <div class="config-row">
            <label>VRAM Budget</label>
            <input id="mode-vram" type="range" min="0" max="20" step="0.5" value="10" />
            <span id="mode-vram-val" class="slider-val">10 GB</span>
          </div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>RAM Budget</label>
            <input id="mode-ram" type="range" min="0" max="62" step="1" value="32" />
            <span id="mode-ram-val" class="slider-val">32 GB</span>
          </div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Mode Priority</label>
            <select id="mode-priority">
              <option value="primary">Primary — resources first</option>
              <option value="secondary">Secondary — yields to primary</option>
            </select>
          </div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Limit Mode</label>
            <select id="mode-limit">
              <option value="soft">Soft Warning</option>
              <option value="hard">Hard Cutoff</option>
            </select>
          </div>
          <div class="config-sub hidden" id="sub-mode-limit"></div>
        </div>
        <div class="config-field">
          <div class="config-row">
            <label>Services</label>
            <span id="mode-services" class="sub-desc"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>const OLLMO_API = window.location.origin;</script>
  <script src="nodes/services.js"></script>
  <script src="nodes/capabilities.js"></script>
  <script src="panels/timeline.js"></script>
  <script src="app.js"></script>
</body>
</html>
