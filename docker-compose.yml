# oAIo — SYS-PANDORA-OAO service stack
# Run: docker compose up -d
# Stop: docker compose down
# Logs: docker compose logs -f [service]

networks:
  oaio-net:
    driver: bridge

volumes:
  open-webui:

services:

  # ── Ollama LLM ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - /mnt/oaio/ollama:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  # ── Open-WebUI ───────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:3000:8080"
    volumes:
      - open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # TTS routes through RVC proxy (Kokoro → RVC → voice output)
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://rvc:8001/v1
      - AUDIO_TTS_OPENAI_API_KEY=sk-oaio
      - AUDIO_TTS_VOICE=af_heart
      # RAG — use Ollama embeddings instead of Docker-local model
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - RAG_RERANKING_MODEL=
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
    depends_on:
      - ollama
      - rvc

  # ── Kokoro TTS ───────────────────────────────────────────────────────────────
  kokoro-tts:
    image: kokoro-tts
    container_name: kokoro-tts
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:8000:8000"
    volumes:
      - /mnt/oaio/kokoro-voices:/models

  # ── RVC (voice conversion proxy) ─────────────────────────────────────────────
  rvc:
    build:
      context: .
      dockerfile: docker/rvc/Dockerfile
    image: rvc:fixed
    container_name: rvc
    restart: "no"
    networks: [oaio-net]
    command: ["/bin/bash", "-c", "python3 /rvc/infer-web.py --pycmd python3 --port 7865 --noautoopen & python3 /rvc/rvc_proxy.py"]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:7865:7865"
      - "${OAIO_BIND:-127.0.0.1}:8001:8001"
    volumes:
      - /mnt/oaio/rvc-ref:/rvc/audio
      - /mnt/oaio/rvc-weights:/rvc/assets/weights
      - /mnt/oaio/rvc-indices:/rvc/assets/indices
      - ./docker/rvc/rvc_proxy.py:/rvc/rvc_proxy.py
      - /mnt/oaio/staging/rvc-output:/rvc/output
    environment:
      - KOKORO_URL=http://kokoro-tts:8000
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    depends_on:
      - kokoro-tts

  # ── F5-TTS (voice cloning) ────────────────────────────────────────────────────
  f5-tts:
    build:
      context: .
      dockerfile: docker/f5-tts/Dockerfile
    image: f5-tts:fixed
    container_name: f5-tts
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:7860:7860"
    volumes:
      - /mnt/oaio/hf-cache:/hf-cache
      - /mnt/oaio/ref-audio:/ref-audio
      - /mnt/oaio/staging/f5-output:/output
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video

  # ── StyleTTS2 (voice prototyping) ─────────────────────────────────────────────
  styletts2:
    build:
      context: .
      dockerfile: docker/styletts2/Dockerfile
    container_name: styletts2
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:7870:7870"
    volumes:
      - /mnt/oaio/hf-cache:/root/.cache/huggingface
      - /mnt/oaio/staging/styletts2-output:/output
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - PYTORCH_ROCM_ARCH=${PYTORCH_ROCM_ARCH:-gfx1100}

  # ── Faster-Whisper STT (CPU — CTranslate2 doesn't support ROCm) ─────────────
  faster-whisper:
    build:
      context: .
      dockerfile: docker/faster-whisper/Dockerfile
    container_name: faster-whisper
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:8003:8003"
      - "${OAIO_BIND:-127.0.0.1}:7880:7880"
    volumes:
      - /dev/shm/oaio-whisper:/hf-cache
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
      - WHISPER_DEVICE=cpu
      - HF_HOME=/hf-cache

  # ── ComfyUI ──────────────────────────────────────────────────────────────────
  comfyui:
    build:
      context: .
      dockerfile: docker/comfyui/Dockerfile
    container_name: comfyui
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:8188:8188"
    volumes:
      - /mnt/oaio/models:/ComfyUI/models
      - /mnt/oaio/custom-nodes:/ComfyUI/custom_nodes
      - /mnt/oaio/comfyui-user:/ComfyUI/user
      - /mnt/oaio/outputs:/ComfyUI/output
      - /mnt/oaio/inputs:/ComfyUI/input
      - /mnt/oaio/hf-cache:/hf-cache
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - PYTORCH_ROCM_ARCH=${PYTORCH_ROCM_ARCH:-gfx1100}
      - HF_HOME=/hf-cache

  # ── IndexTTS-2 (voice cloning, experimental) ─────────────────────────────────
  indextts:
    build:
      context: .
      dockerfile: docker/indextts/Dockerfile
    container_name: indextts
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:8004:8004"
      - "${OAIO_BIND:-127.0.0.1}:7890:7890"
    volumes:
      - /mnt/oaio/indextts-models:/models
      - /mnt/oaio/hf-cache:/hf-cache
      - /mnt/oaio/ref-audio:/ref-audio
      - /mnt/oaio/staging/indextts-output:/output
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - PYTORCH_ROCM_ARCH=${PYTORCH_ROCM_ARCH:-gfx1100}
      - HF_HOME=/hf-cache

  # ── MoMask (text-to-motion animation) ─────────────────────────────────────────
  momask:
    build:
      context: .
      dockerfile: docker/momask/Dockerfile
    container_name: momask
    restart: "no"
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:8005:8005"
    volumes:
      - /mnt/oaio/momask-models:/models
      - /mnt/oaio/hf-cache:/hf-cache
      - /mnt/oaio/staging/momask-output:/output
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.0.0}
      - PYTORCH_ROCM_ARCH=${PYTORCH_ROCM_ARCH:-gfx1100}
      - HF_HOME=/hf-cache

  # ── oAIo (control plane + UI) ────────────────────────────────────────────────
  oaio:
    build:
      context: .
      dockerfile: docker/oaio/Dockerfile
    container_name: oaio
    restart: unless-stopped
    networks: [oaio-net]
    ports:
      - "${OAIO_BIND:-127.0.0.1}:9000:9000"    # oLLMo API + frontend UI
      - "${OAIO_BIND:-127.0.0.1}:8002:8002"    # oAudio API
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/class/drm:/sys/class/drm:ro
      - /proc:/host-proc:ro                          # per-process VRAM via fdinfo
      - /mnt/oaio/rvc-ref:/rvc/audio
      - /mnt/oaio/comfyui-user:/comfyui-user:ro
      - ./config:/app/config
      - ./templates:/app/templates
      - ./extensions:/app/extensions
      - ./frontend:/app/frontend
      - /mnt/oaio:/mnt/oaio
      - /dev/shm:/dev/shm                       # RAM tier — host tmpfs for fast staging
      - /mnt/storage:/mnt/storage:ro
      - /mnt/windows-sata:/mnt/windows-sata:ro
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    environment:
      - KOKORO_URL=http://kokoro-tts:8000
      - RVC_PROXY=http://rvc:8001
      - RVC_GRADIO=http://rvc:7865
      - F5_TTS_URL=http://f5-tts:7860
      - STT_URL=http://faster-whisper:8003
      - OUTPUT_BASE=/rvc/audio
      - OLLAMA_URL=http://ollama:11434
      - COMFYUI_USER_PATH=/comfyui-user
      - OAIO_SYMLINK_ROOT=${OAIO_SYMLINK_ROOT:-/mnt/oaio}
      - OAIO_API_TOKEN=${OAIO_API_TOKEN:-}
      - HF_HOME=/mnt/oaio/hf-cache
    depends_on:
      - ollama
      - kokoro-tts
      - rvc
